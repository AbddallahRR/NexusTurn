<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Asistente de Turnos</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:        #0f1117;
      --surface:   #1a1d27;
      --surface2:  #22263a;
      --border:    #2e3350;
      --accent:    #5b7fff;
      --accent-dim:#3a4fa8;
      --text:      #e2e6f3;
      --text-muted:#7a82a8;
      --user-bg:   #1e2f6e;
      --bot-bg:    #1a1d27;
      --radius:    14px;
      --font:      'Segoe UI', system-ui, sans-serif;
    }

    html, body {
      height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: var(--font);
      font-size: 15px;
    }

    /* ── Layout ─────────────────────────────── */
    .app {
      display: flex;
      flex-direction: column;
      height: 100vh;
      max-width: 720px;
      margin: 0 auto;
    }

    /* ── Header ─────────────────────────────── */
    header {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 18px 20px;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }

    .avatar {
      width: 42px; height: 42px;
      border-radius: 50%;
      background: var(--accent);
      display: flex; align-items: center; justify-content: center;
      font-size: 20px;
      flex-shrink: 0;
    }

    .header-info h1 { font-size: 16px; font-weight: 600; }
    .header-info p  { font-size: 12px; color: var(--text-muted); margin-top: 2px; }

    .status-dot {
      width: 8px; height: 8px; border-radius: 50%;
      background: #4ade80;
      margin-left: auto;
      box-shadow: 0 0 6px #4ade8066;
    }

    /* ── Messages ───────────────────────────── */
    .messages {
      flex: 1;
      overflow-y: auto;
      padding: 24px 16px;
      display: flex;
      flex-direction: column;
      gap: 16px;
      scroll-behavior: smooth;
    }

    .messages::-webkit-scrollbar { width: 6px; }
    .messages::-webkit-scrollbar-track { background: transparent; }
    .messages::-webkit-scrollbar-thumb { background: var(--border); border-radius: 99px; }

    /* Mensaje individual */
    .msg {
      display: flex;
      gap: 10px;
      max-width: 88%;
      animation: fadeUp .2s ease;
    }
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(6px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .msg.user  { align-self: flex-end; flex-direction: row-reverse; }
    .msg.bot   { align-self: flex-start; }

    .msg-icon {
      width: 32px; height: 32px; border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 15px; flex-shrink: 0;
      margin-top: 2px;
    }
    .msg.user .msg-icon { background: var(--accent-dim); }
    .msg.bot  .msg-icon { background: var(--surface2); }

    .bubble {
      padding: 10px 14px;
      border-radius: var(--radius);
      line-height: 1.55;
      white-space: pre-wrap;
      word-break: break-word;
    }
    .msg.user .bubble {
      background: var(--user-bg);
      border-bottom-right-radius: 4px;
      color: #c9d5ff;
    }
    .msg.bot .bubble {
      background: var(--bot-bg);
      border: 1px solid var(--border);
      border-bottom-left-radius: 4px;
    }

    /* Cursor parpadeante mientras streamea */
    .cursor::after {
      content: '▋';
      animation: blink .7s step-end infinite;
      color: var(--accent);
      margin-left: 2px;
    }
    @keyframes blink { 50% { opacity: 0; } }

    /* Mensaje de bienvenida vacío inicial */
    .empty-state {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 12px;
      color: var(--text-muted);
      text-align: center;
      padding: 40px;
    }
    .empty-state .icon { font-size: 48px; }
    .empty-state h2 { font-size: 18px; color: var(--text); }
    .empty-state p  { font-size: 13px; max-width: 300px; }

    /* Sugerencias rápidas */
    .suggestions {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      justify-content: center;
      margin-top: 8px;
    }
    .suggestion-btn {
      background: var(--surface2);
      border: 1px solid var(--border);
      color: var(--text);
      border-radius: 99px;
      padding: 6px 14px;
      font-size: 13px;
      cursor: pointer;
      transition: background .15s, border-color .15s;
    }
    .suggestion-btn:hover {
      background: var(--accent-dim);
      border-color: var(--accent);
    }

    /* ── Input bar ───────────────────────────── */
    .input-bar {
      padding: 14px 16px;
      background: var(--surface);
      border-top: 1px solid var(--border);
      display: flex;
      gap: 10px;
      align-items: flex-end;
      flex-shrink: 0;
    }

    textarea {
      flex: 1;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 10px;
      color: var(--text);
      font-family: var(--font);
      font-size: 14px;
      padding: 10px 14px;
      resize: none;
      outline: none;
      line-height: 1.5;
      max-height: 120px;
      transition: border-color .15s;
    }
    textarea:focus      { border-color: var(--accent); }
    textarea::placeholder { color: var(--text-muted); }

    .send-btn {
      width: 42px; height: 42px;
      border-radius: 10px;
      background: var(--accent);
      border: none;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: background .15s, transform .1s;
      flex-shrink: 0;
    }
    .send-btn:hover:not(:disabled)  { background: #7090ff; }
    .send-btn:active:not(:disabled) { transform: scale(.93); }
    .send-btn:disabled { background: var(--border); cursor: not-allowed; }
    .send-btn svg { width: 18px; height: 18px; fill: #fff; }
  </style>
</head>
<body>
<div class="app">

  <!-- Header -->
  <header>
    <div class="avatar">🤖</div>
    <div class="header-info">
      <h1>Asistente de Turnos</h1>
      <p>Consulta el estado de la cola en tiempo real</p>
    </div>
    <div class="status-dot" title="En línea"></div>
  </header>

  <!-- Mensajes -->
  <div class="messages" id="messages">
    <div class="empty-state" id="emptyState">
      <div class="icon">💬</div>
      <h2>¿En qué puedo ayudarte?</h2>
      <p>Puedo informarte sobre tiempos de espera, ventanillas y tu posición en la cola.</p>
      <div class="suggestions">
        <button class="suggestion-btn" onclick="enviarSugerencia(this)">¿Cuántas personas hay en cola?</button>
        <button class="suggestion-btn" onclick="enviarSugerencia(this)">¿Cuánto tiempo debo esperar?</button>
        <button class="suggestion-btn" onclick="enviarSugerencia(this)">¿Qué ventanillas están abiertas?</button>
      </div>
    </div>
  </div>

  <!-- Input -->
  <div class="input-bar">
    <textarea
      id="input"
      rows="1"
      placeholder="Escribe tu pregunta..."
      onkeydown="handleKey(event)"
      oninput="autoResize(this)"
    ></textarea>
    <button class="send-btn" id="sendBtn" onclick="enviar()" title="Enviar">
      <svg viewBox="0 0 24 24"><path d="M2 21l21-9L2 3v7l15 2-15 2z"/></svg>
    </button>
  </div>

</div>

<script>
  const messagesEl = document.getElementById('messages');
  const inputEl    = document.getElementById('input');
  const sendBtn    = document.getElementById('sendBtn');
  const emptyState = document.getElementById('emptyState');

  let streaming = false;

  /* ── Helpers UI ─────────────────────────────── */

  function scrollBottom() {
    messagesEl.scrollTop = messagesEl.scrollHeight;
  }

  function autoResize(el) {
    el.style.height = 'auto';
    el.style.height = Math.min(el.scrollHeight, 120) + 'px';
  }

  function addMessage(role, text = '') {
    if (emptyState.parentNode) emptyState.remove();

    const wrap   = document.createElement('div');
    wrap.className = `msg ${role}`;

    const icon   = document.createElement('div');
    icon.className = 'msg-icon';
    icon.textContent = role === 'user' ? '👤' : '🤖';

    const bubble = document.createElement('div');
    bubble.className = 'bubble';
    bubble.textContent = text;

    wrap.appendChild(icon);
    wrap.appendChild(bubble);
    messagesEl.appendChild(wrap);
    scrollBottom();
    return bubble;
  }

  /* ── Envío ───────────────────────────────────── */

  function handleKey(e) {
    if (e.key === 'Enter' && !e.shiftKey) {
      e.preventDefault();
      enviar();
    }
  }

  function enviarSugerencia(btn) {
    inputEl.value = btn.textContent.trim();
    enviar();
  }

  async function enviar() {
    const texto = inputEl.value.trim();
    if (!texto || streaming) return;

    // Mensaje del usuario
    addMessage('user', texto);
    inputEl.value = '';
    inputEl.style.height = 'auto';

    // Burbuja del bot (vacía al inicio, va llenándose con el stream)
    const botBubble = addMessage('bot', '');
    botBubble.classList.add('cursor');
    sendBtn.disabled = true;
    streaming = true;

    try {
      const res = await fetch('/api/chat', {
        method:  'POST',
        headers: { 'Content-Type': 'application/json' },
        body:    JSON.stringify({ mensaje: texto }),
      });

      const reader  = res.body.getReader();
      const decoder = new TextDecoder();
      let buffer = '';

      while (true) {
        const { value, done } = await reader.read();
        if (done) break;

        buffer += decoder.decode(value, { stream: true });
        const lines = buffer.split('\n');
        buffer = lines.pop(); // guarda línea incompleta

        for (const line of lines) {
          if (!line.startsWith('data:')) continue;
          const raw = line.slice(5).trim();
          if (raw === '[DONE]') break;
          try {
            const { token } = JSON.parse(raw);
            botBubble.textContent += token;
            scrollBottom();
          } catch { /* ignorar líneas malformadas */ }
        }
      }
    } catch (err) {
      botBubble.textContent = '⚠️ No pude conectar con el asistente. Intenta de nuevo.';
      console.error(err);
    } finally {
      botBubble.classList.remove('cursor');
      sendBtn.disabled = false;
      streaming = false;
      inputEl.focus();
    }
  }
</script>
</body>
</html>
