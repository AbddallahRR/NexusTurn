<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>NexusTurn</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: system-ui, sans-serif; background: #f0f0f0; min-height: 100vh; }

    .header {
      background: #1a1a1a; color: white;
      padding: 14px 16px;
      display: flex; align-items: center; justify-content: space-between;
    }
    .header-logo { display: flex; align-items: center; gap: 10px; font-size: 17px; font-weight: 500; }
    .header-icon { width: 28px; height: 28px; background: #444; border-radius: 4px; }
    .header-menu { width: 28px; height: 28px; background: #444; border-radius: 4px; }

    .content {
      padding: 20px 16px;
      display: flex; flex-direction: column; gap: 20px;
      max-width: 480px; margin: 0 auto;
    }

    .section-title { font-size: 18px; font-weight: 500; color: #111; margin-bottom: 10px; }

    .turno-card { background: #e8e8e8; border-radius: 8px; padding: 16px; display: none; }
    .turno-card.visible { display: block; }
    .turno-label { font-size: 13px; color: #555; margin-bottom: 4px; }
    .turno-numero { font-size: 26px; font-weight: 600; color: #111; margin-bottom: 6px; }
    .turno-detalle { font-size: 13px; color: #555; }

    .btn-solicitar {
      background: #1a1a1a; color: white; width: 100%;
      padding: 16px; border-radius: 8px;
      font-size: 16px; font-weight: 500;
      cursor: pointer; border: none; transition: opacity .15s;
    }
    .btn-solicitar:hover { opacity: .85; }
    .btn-solicitar:disabled { opacity: .5; cursor: not-allowed; }

    .botones { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
    .btn {
      padding: 14px; border-radius: 8px;
      font-size: 15px; font-weight: 500;
      cursor: pointer; border: none;
      background: #e0e0e0; color: #111;
      transition: background .15s, opacity .15s;
    }
    .btn:hover { background: #d0d0d0; }
    .btn:disabled { opacity: .45; cursor: not-allowed; }
    .btn-cancelar:hover { background: #f0c0c0; color: #900; }

    .alertas-lista { display: flex; flex-direction: column; gap: 10px; }
    .alerta {
      background: #e8e8e8; border-radius: 8px;
      padding: 14px 16px;
      display: flex; align-items: center; gap: 12px;
      font-size: 14px; color: #111;
      opacity: 0; transform: translateY(6px);
      transition: opacity .3s, transform .3s;
    }
    .alerta.visible { opacity: 1; transform: translateY(0); }
    .alerta-icon { width: 22px; height: 22px; border-radius: 4px; flex-shrink: 0; }
    .alerta-icon.naranja { background: #e07020; }
    .alerta-icon.verde   { background: #1a9a50; }

    .error-msg { color: #c0392b; font-size: 13px; margin-top: 10px; display: none; text-align: center; }
  </style>
</head>
<body>

  <div class="header">
    <div class="header-logo">
      <div class="header-icon"></div>
      NexusTurn
    </div>
    <div class="header-menu"></div>
  </div>

  <div class="content">

    <div>
      <div class="section-title">Turno actual</div>
      <div id="vista-solicitar">
        <button class="btn-solicitar" id="btn-solicitar">Solicitar turno</button>
        <div class="error-msg" id="error-msg">No se pudo conectar con el servidor. Intenta de nuevo.</div>
      </div>
      <div class="turno-card" id="turno-card">
        <div class="turno-label">Número de turno</div>
        <div class="turno-numero" id="num-turno">—</div>
        <div class="turno-detalle" id="turno-detalle">—</div>
      </div>
    </div>

    <div class="botones" id="botones-accion" style="display: none;">
      <button class="btn" id="btn-modificar">Modificar</button>
      <button class="btn btn-cancelar" id="btn-cancelar">Cancelar</button>
    </div>

    <div>
      <div class="section-title">Alertas</div>
      <div class="alertas-lista">
        <div class="alerta" id="alerta-cerca">
          <div class="alerta-icon naranja"></div>
          <span id="alerta-cerca-texto">Tu turno está a 3 lugares</span>
        </div>
        <div class="alerta" id="alerta-llamado">
          <div class="alerta-icon verde"></div>
          Tu turno está siendo atendido
        </div>
      </div>
    </div>

  </div>

  <script>
    let turnoActual = null;
    let wsUsuario   = null;

    const btnSolicitar   = document.getElementById('btn-solicitar');
    const btnModificar   = document.getElementById('btn-modificar');
    const btnCancelar    = document.getElementById('btn-cancelar');
    const errorMsg       = document.getElementById('error-msg');
    const turnoCard      = document.getElementById('turno-card');
    const vistaSolicitar = document.getElementById('vista-solicitar');
    const botonesAccion  = document.getElementById('botones-accion');

    btnSolicitar.addEventListener('click', solicitarTurno);
    btnModificar.addEventListener('click', modificarTurno);
    btnCancelar.addEventListener('click',  cancelarTurno);

    // ── UI ────────────────────────────────────────────────────

    function mostrarTurno(datos) {
      turnoActual = datos;
      document.getElementById('num-turno').textContent = datos.numero;

      // Al solicitar el turno, el servidor devuelve `personas_delante`.
      // El WebSocket luego usará `posicion`. Normalizamos aquí.
      const posicion = datos.posicion ?? datos.personas_delante ?? 0;
      actualizarDetalle({
        estado:          datos.estado ?? 'EN_COLA',
        posicion:        posicion,
        ventanilla:      datos.ventanilla,
        tiempo_estimado: datos.tiempo_estimado
      });

      vistaSolicitar.style.display = 'none';
      turnoCard.classList.add('visible');
      botonesAccion.style.display  = 'grid';
      btnModificar.textContent = 'Modificar';
      btnModificar.disabled    = false;
      btnCancelar.textContent  = 'Cancelar';
      btnCancelar.disabled     = false;

      conectarWsUsuario(datos.id);
    }

    function actualizarDetalle(datos) {
      // datos siempre tiene: estado, posicion, ventanilla, tiempo_estimado
      const ventanilla = datos.ventanilla ?? '—';
      const tiempo     = datos.tiempo_estimado ?? 0;
      document.getElementById('turno-detalle').textContent =
        `Ventanilla ${ventanilla} · Estimado ${tiempo} min`;

      // Resetea alertas
      document.getElementById('alerta-cerca').classList.remove('visible');
      document.getElementById('alerta-llamado').classList.remove('visible');

      if (datos.estado === 'LLAMADO' || datos.estado === 'ATENDIENDO') {
        document.getElementById('alerta-llamado').classList.add('visible');
      } else if (datos.posicion === 0) {
        // Es el primero en la cola pero aún no ha sido llamado
        document.getElementById('alerta-llamado').classList.add('visible');
      } else if (datos.posicion <= 3) {
        // Actualiza el texto con el número exacto de personas delante
        document.getElementById('alerta-cerca-texto').textContent =
          `Tu turno está a ${datos.posicion} ${datos.posicion === 1 ? 'lugar' : 'lugares'}`;
        document.getElementById('alerta-cerca').classList.add('visible');
      }
    }

    function limpiarVista() {
      turnoActual = null;

      if (wsUsuario) { wsUsuario.close(); wsUsuario = null; }

      turnoCard.classList.remove('visible');
      botonesAccion.style.display  = 'none';
      vistaSolicitar.style.display = 'block';
      btnSolicitar.textContent = 'Solicitar turno';
      btnSolicitar.disabled    = false;
      document.getElementById('alerta-cerca').classList.remove('visible');
      document.getElementById('alerta-llamado').classList.remove('visible');
    }

    // ── WebSocket ─────────────────────────────────────────────

    function conectarWsUsuario(turnoId) {
      if (wsUsuario) wsUsuario.close();
      wsUsuario = new WebSocket(`ws://${location.host}/api/ws/turno/${turnoId}`);

      wsUsuario.onmessage = (evento) => {
        const datos = JSON.parse(evento.data);
        actualizarDetalle(datos);   // posicion ya viene correcta del servidor
      };

      wsUsuario.onclose = () => {
        if (turnoActual) setTimeout(() => conectarWsUsuario(turnoActual.id), 3000);
      };
    }

    // ── API ───────────────────────────────────────────────────

    async function solicitarTurno() {
      btnSolicitar.textContent = 'Solicitando...';
      btnSolicitar.disabled    = true;
      errorMsg.style.display   = 'none';
      try {
        const res = await fetch('/api/turno', { method: 'POST' });
        if (!res.ok) throw new Error(`Error ${res.status}`);
        mostrarTurno(await res.json());
      } catch (err) {
        console.error(err);
        btnSolicitar.textContent = 'Solicitar turno';
        btnSolicitar.disabled    = false;
        errorMsg.style.display   = 'block';
      }
    }

    async function modificarTurno() {
      if (!turnoActual) return;
      btnModificar.textContent = 'Modificando...';
      btnModificar.disabled    = true;
      btnCancelar.disabled     = true;
      try {
        const r1 = await fetch(`/api/turno/${turnoActual.id}/cancelar`, { method: 'PATCH' });
        if (!r1.ok) throw new Error(`Error al cancelar: ${r1.status}`);
        const r2 = await fetch('/api/turno', { method: 'POST' });
        if (!r2.ok) throw new Error(`Error al solicitar: ${r2.status}`);
        mostrarTurno(await r2.json());
      } catch (err) {
        console.error(err);
        btnModificar.textContent = 'Modificar';
        btnModificar.disabled    = false;
        btnCancelar.disabled     = false;
      }
    }

    async function cancelarTurno() {
      if (!turnoActual) return;
      btnCancelar.textContent = 'Cancelando...';
      btnCancelar.disabled    = true;
      btnModificar.disabled   = true;
      try {
        const res = await fetch(`/api/turno/${turnoActual.id}/cancelar`, { method: 'PATCH' });
        if (!res.ok) throw new Error(`Error ${res.status}`);
        limpiarVista();
      } catch (err) {
        console.error(err);
        btnCancelar.textContent = 'Cancelar';
        btnCancelar.disabled    = false;
        btnModificar.disabled   = false;
      }
    }
  </script>
</body>
</html>
